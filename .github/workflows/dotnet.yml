# CI/CD — ObservaNet_CM
# Builds, tests, and publishes Docker images for the API, React dashboard, and Angular dashboard.

name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/observanet

jobs:
  # ─── .NET build + test ──────────────────────────────────────────────────────
  dotnet:
    name: .NET Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ObservaNet_CM.sln

      - name: Build
        run: dotnet build ObservaNet_CM.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test ObservaNet_CM.sln --no-build --configuration Release --verbosity normal

  # ─── Angular build ──────────────────────────────────────────────────────────
  angular:
    name: Angular Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/ObservaNet.Dashboard.Angular/package-lock.json

      - name: Install dependencies
        working-directory: src/ObservaNet.Dashboard.Angular
        run: npm ci

      - name: Build
        working-directory: src/ObservaNet.Dashboard.Angular
        run: npm run build

  # ─── Docker images ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [dotnet, angular]
    # Only push on pushes to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/ObservaNet.Api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push React Dashboard
        uses: docker/build-push-action@v6
        with:
          context: src/ObservaNet.Dashboard
          file: src/ObservaNet.Dashboard/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-dashboard:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Angular Dashboard
        uses: docker/build-push-action@v6
        with:
          context: src/ObservaNet.Dashboard.Angular
          file: src/ObservaNet.Dashboard.Angular/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-dashboard-angular:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-dashboard-angular:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

